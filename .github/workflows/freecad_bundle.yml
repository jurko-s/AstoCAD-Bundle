name: freecad_bundle

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      freecad_version:
        description: 'FreeCAD version to build (tag, branch, or commit)'
        required: true
        default: '1.0.2'
        type: string

jobs:
  build-bundles:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            bundle_dir: conda/osx
            asset_pattern: AstoCAD_.*macOS-x86_64
          - os: ubuntu-latest
            bundle_dir: conda/linux
            asset_pattern: AstoCAD_.*Linux-x86_64

    steps:
      # Checkout bundle scripts
      - uses: actions/checkout@v4
        name: Checkout Bundle Scripts
        with:
          path: bundle-scripts

      # Checkout FreeCAD source at specified version
      - name: Checkout FreeCAD Source
        uses: actions/checkout@v4
        with:
          repository: FreeCAD/FreeCAD
          ref: ${{ github.event.inputs.freecad_version || '1.0.2' }}
          path: freecad-source
          submodules: 'recursive'

      # Setup Conda
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          use-mamba: true
          miniforge-variant: Miniforge3
          conda-remove-defaults: "true"

      # Linux-specific setup
      - if: matrix.os == 'ubuntu-latest'
        name: update linux
        run: |
          sudo apt-get update -qq && sudo apt-get install -y desktop-file-utils appstream zsync curl;
          curl -LO https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-$(uname -m).AppImage;
          chmod a+x appimagetool-$(uname -m).AppImage;

      # Install conda dependencies
      - name: install conda dependencies
        run: |
          mamba install p7zip sed curl -y -c conda-forge;

      # Create bundle
      - name: create bundle
        run: "bash ./create_bundle.sh"
        working-directory: ${{ matrix.bundle_dir }}
        env:
            DEPLOY_RELEASE: ${{ github.event.inputs.freecad_version || '1.0.2' }}
            FREECAD_VERSION: ${{ github.event.inputs.freecad_version || '1.0.2' }}
            # Remove GPG-related env vars if you don't have secrets
            # GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
            # APPIMAGETOOL_SIGN_PASSPHRASE: ${{ secrets.APPIMAGETOOL_SIGN_PASSPHRASE }}

      # Upload macOS Intel Bundle
      - name: Upload macOS Intel Bundle
        if: matrix.os == 'macos-14' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: FreeCAD-${{ github.event.inputs.freecad_version || '1.0.2' }}-macOS-x86_64
          path: ${{ matrix.bundle_dir }}/AstoCAD_*.dmg
          retention-days: 30

      # Upload Linux AppImage (x86_64)
      - name: Upload Linux AppImage
        if: matrix.os == 'ubuntu-latest' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: FreeCAD-${{ github.event.inputs.freecad_version || '1.0.2' }}-Linux-x86_64-AppImage
          path: ${{ matrix.bundle_dir }}/AstoCAD_*.AppImage
          retention-days: 30
